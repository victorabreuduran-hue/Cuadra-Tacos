<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">

  <!-- White background for app icon shape -->
  <rect width="512" height="512" rx="110" fill="white"/>

  <!-- Black spiky star — outer -->
  <polygon points="
    256,18  298,175  446,72  328,210
    502,256  328,302  446,440  298,337
    256,494  214,337  66,440  184,302
    10,256   184,210  66,72   214,175"
    fill="#111111"/>

  <!-- Orange diamond / rotated square — back layer -->
  <rect x="108" y="108" width="296" height="296" rx="10"
    fill="#F97316" transform="rotate(-12 256 256)"/>

  <!-- Orange diamond — front layer slightly rotated -->
  <rect x="118" y="118" width="276" height="276" rx="8"
    fill="#EA580C" transform="rotate(8 256 256)"/>

  <!-- Decorative white horizontal lines -->
  <line x1="138" y1="208" x2="374" y2="208" stroke="white" stroke-width="2.5"
    transform="rotate(8 256 256)" opacity="0.95"/>
  <line x1="138" y1="304" x2="374" y2="304" stroke="white" stroke-width="2.5"
    transform="rotate(8 256 256)" opacity="0.95"/>

  <!-- TACOS label -->
  <text x="256" y="202"
    font-family="Arial, Helvetica, sans-serif"
    font-size="34" font-weight="900" letter-spacing="10"
    text-anchor="middle" fill="white"
    transform="rotate(8 256 256)">TACOS</text>

  <!-- LA CUADRA main lettering with black outline -->
  <text x="256" y="272"
    font-family="Arial Black, Impact, sans-serif"
    font-size="66" font-weight="900"
    text-anchor="middle"
    fill="white" stroke="#111111" stroke-width="5" paint-order="stroke"
    transform="rotate(8 256 256)">LaCuadra</text>

  <!-- 1996 year -->
  <text x="256" y="320"
    font-family="Arial, Helvetica, sans-serif"
    font-size="32" font-weight="700" letter-spacing="5"
    text-anchor="middle" fill="white"
    transform="rotate(8 256 256)">— 1996 —</text>

</svg>
